    <style>
        html,
        body {
            min-height: 100%;
            margin: 0;
            background: #121212;
        }

        .loading-screen {
            display: grid;
            min-height: 100vh;
            place-items: center;
            padding: 24px;
            background: radial-gradient(circle at 50% 28%, rgba(99, 102, 241, 0.16), transparent 34%), #121212;
            color: white;
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
        }

        .loading-panel {
            display: grid;
            justify-items: center;
            gap: 22px;
            width: min(360px, 100%);
            padding: 34px 30px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 18px;
            background: #1e1e1e;
            box-shadow: 0 24px 70px rgba(0, 0, 0, 0.36);
        }

        .loading-mark {
            display: grid;
            grid-template-columns: repeat(2, 28px);
            gap: 8px;
            transform: rotate(45deg);
        }

        .loading-token {
            width: 28px;
            height: 28px;
            border-radius: 7px;
            animation: loading-token-pulse 1.4s ease-in-out infinite;
        }

        .loading-token-blue {
            background: #6366F1;
        }

        .loading-token-green {
            background: #2ECC71;
            animation-delay: 0.12s;
        }

        .loading-token-yellow {
            background: #F59E0B;
            animation-delay: 0.24s;
        }

        .loading-token-pink {
            background: #EC4899;
            animation-delay: 0.36s;
        }

        .loading-copy {
            display: grid;
            gap: 6px;
            text-align: center;
        }

        .loading-title {
            margin: 0;
            color: white;
            font-size: 2.4rem;
            font-weight: 900;
            line-height: 1;
            letter-spacing: 0;
            text-shadow: 2px 2px 0 #6366F1, 4px 4px 10px rgba(0, 0, 0, 0.5);
        }

        .loading-subtitle {
            margin: 0;
            color: rgba(255, 255, 255, 0.68);
            font-size: 0.95rem;
        }

        .loading-progress-bar {
            position: relative;
            overflow: hidden;
            width: min(280px, 100%);
            height: 8px;
            border-radius: 999px;
            background: #2d2d2d;
        }

        .loading-progress-bar span {
            position: absolute;
            inset: 0 auto 0 0;
            width: 45%;
            border-radius: inherit;
            background: linear-gradient(90deg, #6366F1, #EC4899, #F59E0B);
            animation: loading-progress-slide 1.2s ease-in-out infinite;
        }

        @keyframes loading-token-pulse {
            0%,
            100% {
                opacity: 0.58;
                transform: scale(0.92);
            }

            50% {
                opacity: 1;
                transform: scale(1);
            }
        }

        @keyframes loading-progress-slide {
            0% {
                transform: translateX(-110%);
            }

            100% {
                transform: translateX(230%);
            }
        }
    </style>

<body>
    <div id="app">
        <div class="loading-screen">
            <div class="loading-panel" aria-live="polite">
                <div class="loading-mark" aria-hidden="true">
                    <span class="loading-token loading-token-blue"></span>
                    <span class="loading-token loading-token-green"></span>
                    <span class="loading-token loading-token-yellow"></span>
                    <span class="loading-token loading-token-pink"></span>
                </div>

                <div class="loading-copy">
                    <p class="loading-title">ColorPop</p>
                    <p class="loading-subtitle">Preparing your board</p>
                </div>

                <div class="loading-progress-bar" role="progressbar" aria-label="Loading ColorPop">
                    <span></span>
                </div>
            </div>
        </div>
    </div>
