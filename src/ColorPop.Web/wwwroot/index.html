<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ColorPop.Web</title>
    <base href="/" />
    <link rel="preload" id="webassembly" />
    <link rel="stylesheet" href="lib/bootstrap/dist/css/bootstrap.min.css" />
    <link rel="stylesheet" href="css/app.css" />
    <link rel="icon" type="image/png" href="favicon.png" />
    <link href="_content/MudBlazor/MudBlazor.min.css" rel="stylesheet" />
    <link href="ColorPop.Web.styles.css" rel="stylesheet" />
    <script type="importmap"></script>
</head>

<body>
    <div id="app">
        <div class="loading-screen">
            <div class="loading-panel" aria-live="polite">
                <div class="loading-mark" aria-hidden="true">
                    <span class="loading-token loading-token-blue"></span>
                    <span class="loading-token loading-token-green"></span>
                    <span class="loading-token loading-token-yellow"></span>
                    <span class="loading-token loading-token-pink"></span>
                </div>

                <div class="loading-copy">
                    <p class="loading-title">ColorPop</p>
                    <p class="loading-subtitle">Preparing your board</p>
                </div>

                <div class="loading-progress-bar" role="progressbar" aria-label="Loading ColorPop">
                    <span></span>
                </div>
            </div>
        </div>
    </div>

    <div id="blazor-error-ui">
        An unhandled error has occurred.
        <a href="." class="reload">Reload</a>
        <span class="dismiss">🗙</span>
    </div>
    <script src="_framework/blazor.webassembly#[.{fingerprint}].js"></script>
</body>

</html>
